name: תזכורת בוקר יומית

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC ≈ 08:00–09:00 בישראל
  workflow_dispatch: {}    # מאפשר הרצה ידנית לבדיקה

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build digest
        id: digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/digest.js

      - name: Send email
        if: steps.digest.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: מערכת שחרור חשבונות <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ steps.digest.outputs.subject }}
          html_body: file://digest.html
